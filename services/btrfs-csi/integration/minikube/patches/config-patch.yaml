apiVersion: v1
kind: Secret
metadata:
  name: tesslate-btrfs-csi-config
type: Opaque
stringData:
  # S3 sync is not needed for the PVC lifecycle integration test.
  # Leaving these empty disables the sync daemon.
  S3_ENDPOINT: ""
  S3_BUCKET: ""
  S3_ACCESS_KEY: ""
  S3_SECRET_KEY: ""
  S3_REGION: ""
  SYNC_INTERVAL: "0"
  POOL_PATH: "/mnt/tesslate-pool"
