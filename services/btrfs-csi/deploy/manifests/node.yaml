apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: tesslate-btrfs-csi-node
  labels:
    app: tesslate-btrfs-csi-node
spec:
  selector:
    matchLabels:
      app: tesslate-btrfs-csi-node
  template:
    metadata:
      labels:
        app: tesslate-btrfs-csi-node
    spec:
      terminationGracePeriodSeconds: 600
      serviceAccountName: tesslate-btrfs-csi-node
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        # Ensures /mnt/tesslate-pool is a btrfs filesystem.
        # If not already btrfs, creates a loopback image and mounts it.
        # The mount persists on the host via Bidirectional mountPropagation.
        - name: init-btrfs-pool
          image: tesslate-btrfs-csi:latest
          imagePullPolicy: Always
          command:
            - sh
            - -c
            - |
              set -e
              POOL="/mnt/tesslate-pool"
              IMG="/mnt/tesslate-pool-data/pool.img"
              SIZE="${BTRFS_POOL_SIZE_GB:-50}"

              # Check if already btrfs
              if btrfs filesystem show "$POOL" >/dev/null 2>&1; then
                echo "Pool $POOL is already btrfs, skipping init"
                exit 0
              fi

              echo "Initializing btrfs loopback pool (${SIZE}GB)..."
              mkdir -p /mnt/tesslate-pool-data

              if [ ! -f "$IMG" ]; then
                echo "Creating sparse loopback image at $IMG..."
                truncate -s "${SIZE}G" "$IMG"
                mkfs.btrfs -f -L tesslate-pool "$IMG"
                echo "Loopback image created."
              fi

              echo "Mounting $IMG at $POOL..."
              mount -o loop,compress=zstd "$IMG" "$POOL"

              # Ensure pool subdirectories exist
              mkdir -p "$POOL/volumes" "$POOL/snapshots" "$POOL/templates"
              echo "btrfs pool initialized at $POOL"
          env:
            - name: BTRFS_POOL_SIZE_GB
              value: "50"
          securityContext:
            # nosemgrep: yaml.kubernetes.security.privileged-container
            # Must be privileged to mount loopback devices on the host.
            privileged: true
            runAsUser: 0
          volumeMounts:
            - name: btrfs-pool
              mountPath: /mnt/tesslate-pool
              mountPropagation: Bidirectional
            - name: btrfs-pool-data
              mountPath: /mnt/tesslate-pool-data
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
      containers:
        - name: tesslate-btrfs-csi
          image: tesslate-btrfs-csi:latest
          imagePullPolicy: Always
          args:
            - "--endpoint=unix:///run/csi/csi.sock"
            - "--node-id=$(NODE_NAME)"
            - "--pool-path=/mnt/tesslate-pool"
            - "--mode=node"
            - "--nodeops-port=9741"
          lifecycle:
            preStop:
              exec:
                command:
                  - sh
                  - -c
                  - |
                    wget -q -O- --post-data='' http://localhost:9743/drain || true
                    for i in $(seq 1 580); do
                      [ -f /run/csi/drain-complete ] && exit 0
                      sleep 1
                    done
          ports:
            - name: nodeops
              containerPort: 9741
              protocol: TCP
            - name: fileops
              containerPort: 9742
              protocol: TCP
            - name: drain
              containerPort: 9743
              protocol: TCP
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: ORCHESTRATOR_URL
              value: "http://tesslate-backend-service.tesslate.svc.cluster.local:8000"
          envFrom:
            - secretRef:
                name: tesslate-btrfs-csi-config
          securityContext:
            # nosemgrep: yaml.kubernetes.security.privileged-container
            # CSI node plugins MUST run privileged for Bidirectional mount propagation
            # (required by K8s CSI spec to expose volumes to kubelet). This is standard
            # for all CSI drivers — see kubernetes-csi/csi-driver-host-path as reference.
            privileged: true
            runAsUser: 0
          volumeMounts:
            - name: socket-dir
              mountPath: /run/csi
            - name: kubelet-dir
              mountPath: /var/lib/kubelet
              mountPropagation: Bidirectional
            - name: btrfs-pool
              mountPath: /mnt/tesslate-pool
              mountPropagation: Bidirectional
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi

        - name: csi-node-driver-registrar
          image: registry.k8s.io/sig-storage/csi-node-driver-registrar:v2.12.0
          args:
            - "--csi-address=/run/csi/csi.sock"
            - "--kubelet-registration-path=/var/lib/kubelet/plugins/btrfs.csi.tesslate.io/csi.sock"
          securityContext:
            allowPrivilegeEscalation: false
          volumeMounts:
            - name: socket-dir
              mountPath: /run/csi
            - name: registration-dir
              mountPath: /registration
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 64Mi

      volumes:
        - name: socket-dir
          hostPath:
            path: /var/lib/kubelet/plugins/btrfs.csi.tesslate.io
            type: DirectoryOrCreate
        - name: registration-dir
          hostPath:
            path: /var/lib/kubelet/plugins_registry
            type: Directory
        - name: kubelet-dir
          hostPath:
            path: /var/lib/kubelet
            type: Directory
        - name: btrfs-pool
          hostPath:
            path: /mnt/tesslate-pool
            type: DirectoryOrCreate
        - name: btrfs-pool-data
          hostPath:
            path: /mnt/tesslate-pool-data
            type: DirectoryOrCreate
