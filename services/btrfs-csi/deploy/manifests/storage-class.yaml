apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: tesslate-btrfs
provisioner: btrfs.csi.tesslate.io
reclaimPolicy: Delete
volumeBindingMode: WaitForFirstConsumer
allowVolumeExpansion: true

---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: tesslate-btrfs-nextjs
provisioner: btrfs.csi.tesslate.io
reclaimPolicy: Delete
volumeBindingMode: WaitForFirstConsumer
allowVolumeExpansion: true
parameters:
  template: "nextjs"
