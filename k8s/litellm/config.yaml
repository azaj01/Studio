# =============================================================================
# LiteLLM Proxy Configuration
# =============================================================================
# Models are grouped by provider. When both Bedrock and Vertex share the same
# model_name, LiteLLM treats them as a deployment group with automatic fallback.
#
# Priority-based routing (optional, for when Vertex AI is provisioned):
#   - In router_settings: change routing_strategy to "priority-based-routing"
#   - On each model entry (top-level, NOT inside litellm_params):
#       priority: 0  → preferred (Vertex AI)
#       priority: 1  → fallback (Bedrock)
#   NOTE: Do NOT put priority inside litellm_params — it gets forwarded to
#   the provider API and causes "Extra inputs are not permitted" errors.
#
# Auth:
#   - Bedrock: API key (bearer token) via BEDROCK_API_KEY env var
#   - Vertex AI: Service account JSON via VERTEX_CREDENTIALS env var
#   - Azure: API key via AZURE_API_KEY env var
#
# Docs: https://docs.litellm.ai/docs/proxy/configs
# =============================================================================

# ----------------------------------------------------------------------------------
# General Proxy Settings
# ----------------------------------------------------------------------------------
general_settings:
  master_key: "os.environ/LITELLM_MASTER_KEY"
  database_url: "os.environ/DATABASE_URL"
  database_connection_pool_limit: 20
  store_model_in_db: false
  store_prompts_in_spend_logs: true

# ----------------------------------------------------------------------------------
# Router and Caching Settings
# ----------------------------------------------------------------------------------
router_settings:
  routing_strategy: simple-shuffle
  allowed_fails: 3
  cooldown_time: 60
  num_retries: 2
  timeout: 300
  retry_policy:
    RateLimitErrorRetries: 0
    TimeoutErrorRetries: 2
    InternalServerErrorRetries: 2
    AuthenticationErrorRetries: 0
    BadRequestErrorRetries: 0
    ContentPolicyViolationErrorRetries: 0
  allowed_fails_policy:
    RateLimitErrorAllowedFails: 100
    AuthenticationErrorAllowedFails: 1

# ----------------------------------------------------------------------------------
# LiteLLM Core Settings
# ----------------------------------------------------------------------------------
litellm_settings:
  set_verbose: False
  drop_params: True
  cache: True
  cache_params:
    type: "local"
    ttl: 600

model_list:
  - model_name: "tesslate-omnicoder-9b"
    litellm_params:
      model: "openai/smirki/tessa-coder-9b-sft-v0"
      api_base: "https://tesslate--tesslate-vllm-benchmark-serve.modal.run/v1"
      api_key: "no-key"
    model_info:
      max_tokens: 32768
      max_input_tokens: 131072
      access_groups: ["internal"]

  # # ===========================================================================
  # # AWS Bedrock
  # # ===========================================================================
  # # Auth: Bearer token via BEDROCK_API_KEY env var (requires boto3 >= 1.39.0)
  # # Models with us. prefix use cross-region inference profiles
  # # Models with bedrock/converse/ prefix need the Converse API format
  # # ===========================================================================

