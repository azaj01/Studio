apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: compute-pool-isolation
  namespace: tesslate-compute-pool
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
  ingress: []  # deny all — pods accessed via kubectl exec, not network
  egress:
  - to:  # DNS
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
  - ports:  # HTTP/HTTPS for npm/pip/git
    - protocol: TCP
      port: 443
    - protocol: TCP
      port: 80
