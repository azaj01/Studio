apiVersion: v1
kind: ServiceAccount
metadata:
  name: tesslate-volume-hub
  namespace: kube-system
  labels:
    app.kubernetes.io/name: tesslate-volume-hub
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: tesslate-volume-hub
  labels:
    app.kubernetes.io/name: tesslate-volume-hub
rules:
# Node discovery for cache placement
- apiGroups: [""]
  resources: ["nodes"]
  verbs: ["get", "list", "watch"]
# Pod discovery for cache state
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list"]
# Endpoints discovery for CSI node pod IP resolution
- apiGroups: [""]
  resources: ["endpoints"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: tesslate-volume-hub
  labels:
    app.kubernetes.io/name: tesslate-volume-hub
subjects:
- kind: ServiceAccount
  name: tesslate-volume-hub
  namespace: kube-system
roleRef:
  kind: ClusterRole
  name: tesslate-volume-hub
  apiGroup: rbac.authorization.k8s.io
