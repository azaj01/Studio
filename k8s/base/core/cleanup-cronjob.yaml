# Dev Environment Cleanup CronJob
# Runs periodically to hibernate idle development environments
# Uses EBS VolumeSnapshots: idle → create snapshot → delete namespace

apiVersion: batch/v1
kind: CronJob
metadata:
  name: dev-environment-cleanup
  namespace: tesslate
  labels:
    app: tesslate-backend
    component: cleanup
spec:
  # Run every 2 minutes to cleanup idle environments
  schedule: "*/2 * * * *"
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  concurrencyPolicy: Replace  # Kill stuck job and start fresh if still running at next schedule
  startingDeadlineSeconds: 120  # Allow up to 2 min late start if a run was missed
  jobTemplate:
    spec:
      activeDeadlineSeconds: 300  # Kill job after 5 minutes to prevent stuck runs
      backoffLimit: 1  # Only retry once on failure
      template:
        metadata:
          labels:
            app: tesslate-cleanup
        spec:
          serviceAccountName: tesslate-backend-sa
          restartPolicy: OnFailure
          containers:
          - name: cleanup
            image: tesslate-backend:latest  # Overridden by kustomization images
            imagePullPolicy: Always  # Always pull to get latest code changes
            command: ["python", "-c"]
            args:
              - |
                import asyncio
                import sys
                sys.path.append('/app')

                from app.services.orchestration import get_orchestrator
                from app.config import get_settings
                import logging

                logging.basicConfig(level=logging.INFO)
                logger = logging.getLogger(__name__)

                async def cleanup_idle_environments():
                    """Clean up idle development environments using VolumeSnapshots."""
                    try:
                        settings = get_settings()
                        logger.info("Starting idle environment cleanup (VolumeSnapshot mode)...")
                        logger.info(f"Hibernation idle timeout: {settings.k8s_hibernation_idle_minutes} minutes")

                        # Get the orchestrator (will be KubernetesOrchestrator)
                        orchestrator = get_orchestrator()

                        # Run cleanup - creates snapshots and deletes idle projects
                        cleaned = await orchestrator.cleanup_idle_environments(
                            idle_timeout_minutes=settings.k8s_hibernation_idle_minutes
                        )

                        logger.info(f"Cleanup completed. Hibernated {len(cleaned)} environments")

                        if cleaned:
                            for env in cleaned:
                                logger.info(f"  - Hibernated: {env}")

                    except Exception as e:
                        logger.error(f"Cleanup error: {e}", exc_info=True)
                        sys.exit(1)

                # Run the cleanup
                asyncio.run(cleanup_idle_environments())
            envFrom:
              - secretRef:
                  name: tesslate-app-secrets
              - secretRef:
                  name: postgres-secret
            env:
              - name: KUBERNETES_NAMESPACE
                value: tesslate
              - name: DEPLOYMENT_MODE
                value: "kubernetes"
              - name: K8S_NAMESPACE_PER_PROJECT
                value: "true"
              - name: K8S_STORAGE_CLASS
                value: "tesslate-block-storage"
              - name: K8S_HIBERNATION_IDLE_MINUTES
                value: "5"
              - name: K8S_SNAPSHOT_CLASS
                value: "tesslate-ebs-snapshots"
            resources:
              requests:
                memory: "128Mi"
                cpu: "50m"
              limits:
                memory: "256Mi"
                cpu: "200m"
