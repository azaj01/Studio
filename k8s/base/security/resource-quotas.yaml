# Resource Quotas for Tesslate Platform
# Limits resource consumption in the tesslate namespace

apiVersion: v1
kind: ResourceQuota
metadata:
  name: tesslate-quota
  namespace: tesslate
spec:
  hard:
    # Pod limits (platform ~6 + up to 20 compute pods + rolling update headroom)
    pods: "30"

    # Compute limits (platform + compute pods at 100m/256Mi requests, 2000m/4Gi limits)
    requests.cpu: "14"
    requests.memory: "30Gi"
    limits.cpu: "64"
    limits.memory: "96Gi"

    # Storage limits
    persistentvolumeclaims: "10"
    requests.storage: "100Gi"

---
# LimitRange for default container resources
apiVersion: v1
kind: LimitRange
metadata:
  name: tesslate-limits
  namespace: tesslate
spec:
  limits:
  - type: Container
    default:
      cpu: "500m"
      memory: "512Mi"
    defaultRequest:
      cpu: "100m"
      memory: "128Mi"
    max:
      cpu: "4"
      memory: "4Gi"
    min:
      cpu: "50m"
      memory: "64Mi"
