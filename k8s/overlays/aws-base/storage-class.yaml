# =============================================================================
# AWS EBS gp3 StorageClass
# =============================================================================
# Maps the abstract 'tesslate-block-storage' class to AWS EBS gp3.
# Used for non-template project PVCs. Once the btrfs CSI driver fully
# replaces EBS provisioning, this file can be removed.
# =============================================================================

apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: tesslate-block-storage
  labels:
    app.kubernetes.io/name: tesslate
    app.kubernetes.io/component: storage
provisioner: ebs.csi.aws.com
parameters:
  type: gp3
  fsType: ext4
reclaimPolicy: Delete
volumeBindingMode: WaitForFirstConsumer
allowVolumeExpansion: true
