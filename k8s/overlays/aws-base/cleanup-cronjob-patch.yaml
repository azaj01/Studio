# AWS EKS Cleanup CronJob Patch (Shared)
#
# Mirrors backend-patch.yaml pattern: uses envFrom to auto-mount ALL secret
# keys so DATABASE_SSL and other settings are picked up automatically.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: dev-environment-cleanup
  namespace: tesslate
spec:
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: cleanup
              imagePullPolicy: Always
              # Mount ALL keys from secrets as env vars automatically.
              envFrom:
                - secretRef:
                    name: tesslate-app-secrets
                - secretRef:
                    name: postgres-secret
              env:
                # Replace base env array — envFrom handles all secrets,
                # so we only need static values here.
                - $patch: replace
                - name: DEPLOYMENT_MODE
                  value: "kubernetes"
                - name: KUBERNETES_NAMESPACE
                  value: "tesslate"
                - name: POSTGRES_HOST
                  value: "postgres"
                - name: POSTGRES_PORT
                  value: "5432"
                # Kubernetes configuration
                - name: K8S_NAMESPACE_PER_PROJECT
                  value: "true"
                - name: K8S_STORAGE_CLASS
                  value: "tesslate-block-storage"
                - name: K8S_HIBERNATION_IDLE_MINUTES
                  value: "30"
                - name: K8S_SNAPSHOT_CLASS
                  value: "tesslate-ebs-snapshots"
                # K8s ingress domain alias (reads APP_DOMAIN from secret)
                - name: K8S_INGRESS_DOMAIN
                  valueFrom:
                    secretKeyRef:
                      name: tesslate-app-secrets
                      key: APP_DOMAIN
