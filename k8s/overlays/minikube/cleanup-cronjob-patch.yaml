# CronJob Patches for Minikube
# Fixes imagePullPolicy for local images

apiVersion: batch/v1
kind: CronJob
metadata:
  name: dev-environment-cleanup
  namespace: tesslate
spec:
  jobTemplate:
    spec:
      template:
        spec:
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
          containers:
          - name: cleanup
            imagePullPolicy: Never  # Use locally loaded image
