# MinIO Credentials for Minikube
# Copy this file to minio-credentials.yaml and fill in your values
# DO NOT commit minio-credentials.yaml to git!

apiVersion: v1
kind: Secret
metadata:
  name: minio-credentials
  namespace: minio-system
type: Opaque
stringData:
  MINIO_ROOT_USER: "your-minio-admin-user"
  MINIO_ROOT_PASSWORD: "your-secure-minio-password"
