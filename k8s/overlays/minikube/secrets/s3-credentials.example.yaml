# S3 Credentials for Minikube
# Copy this file to s3-credentials.yaml and fill in your values
# DO NOT commit s3-credentials.yaml to git!

apiVersion: v1
kind: Secret
metadata:
  name: s3-credentials
  namespace: tesslate
type: Opaque
stringData:
  S3_ACCESS_KEY_ID: "your-minio-admin-user"
  S3_SECRET_ACCESS_KEY: "your-secure-minio-password"
  S3_BUCKET_NAME: "tesslate-projects"
  S3_ENDPOINT_URL: "http://minio.minio-system.svc.cluster.local:9000"
  S3_REGION: "us-east-1"
